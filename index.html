
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>FreshTrack</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <script>
    // Theme initialization
    if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    } else {
      document.documentElement.classList.remove('dark');
    }

    // Global toggle mechanism
    window.toggleTheme = () => {
      if (document.documentElement.classList.contains('dark')) {
        document.documentElement.classList.remove('dark');
        localStorage.theme = 'light';
      } else {
        document.documentElement.classList.add('dark');
        localStorage.theme = 'dark';
      }
      window.dispatchEvent(new Event('theme-change'));
    };

    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            "primary": "#9abe89",
            "accent-cream": "#fff8e1",
            "background-light": "#ffffff",
            "background-dark": "#181c16",
            "charcoal": "#333333",
            "muted-green": "#737c6e",
            "sage-soft": "#e8f0e4"
          },
          fontFamily: {
            "display": ["Plus Jakarta Sans", "sans-serif"]
          },
          borderRadius: {
            "DEFAULT": "0.5rem",
            "lg": "1rem",
            "xl": "1.5rem",
            "full": "9999px"
          },
          boxShadow: {
            'fab-glow': '0 15px 35px -5px rgba(154, 190, 137, 0.5), 0 10px 15px -10px rgba(0, 0, 0, 0.2)',
            'soft-card': '0 4px 20px -2px rgba(0, 0, 0, 0.05)',
            'soft': '0 4px 12px rgba(0,0,0,0.03)'
          },
          animation: {
            'pop-in': 'popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards',
            'float': 'float 3s ease-in-out infinite',
            'pulse-soft': 'pulseSoft 2.5s ease-in-out infinite'
          },
          keyframes: {
            popIn: {
              '0%': { transform: 'scale(0.8)', opacity: '0' },
              '100%': { transform: 'scale(1)', opacity: '1' }
            },
            float: {
              '0%, 100%': { transform: 'translateY(0)' },
              '50%': { transform: 'translateY(-6px)' }
            },
            pulseSoft: {
              '0%, 100%': { transform: 'scale(1)', boxShadow: '0 0 0 0 rgba(154, 190, 137, 0)' },
              '50%': { transform: 'scale(1.05)', boxShadow: '0 0 15px 2px rgba(154, 190, 137, 0.3)' }
            }
          }
        }
      }
    }
  </script>
  <style>
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
    }
    .pb-safe {
      padding-bottom: env(safe-area-inset-bottom);
    }
    .bottom-safe {
      bottom: env(safe-area-inset-bottom);
    }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .theme-transition {
      transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
    }
    /* Staggered animation classes */
    .stagger-1 { animation-delay: 100ms; }
    .stagger-2 { animation-delay: 200ms; }
    .stagger-3 { animation-delay: 300ms; }
    .stagger-4 { animation-delay: 400ms; }
  </style>
<script type="importmap">
{
  "imports": {
    "recharts": "https://esm.sh/recharts@^3.6.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "@google/genai": "https://esm.sh/@google/genai@^1.37.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body class="bg-gray-50 text-charcoal dark:bg-background-dark dark:text-gray-100 theme-transition">
  <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
